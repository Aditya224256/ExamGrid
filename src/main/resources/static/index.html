<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamGrid Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="bg-blur bg-blur-1"></div>
    <div class="bg-blur bg-blur-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand-badge">Exam Seating System</div>
            <h1>ExamGrid</h1>
            <p class="subtitle">Login to manage exam seating and student allocations</p>

            <div class="form-group">
                <label for="role">Select Role</label>
                <select id="role">
                    <option value="teacher">Teacher</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <label class="show-pass modern-check">
                <input type="checkbox" onclick="togglePassword('password')">
                <span>Show Password</span>
            </label>

            <div class="button-group">
                <button class="primary-btn" onclick="login()">Login</button>
                <button class="secondary-btn" onclick="goToSignup()">Sign Up</button>
            </div>

            <p id="error" class="message error-message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
