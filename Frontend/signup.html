<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="bg-blur bg-blur-1"></div>
    <div class="bg-blur bg-blur-2"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand-badge">Create New Account</div>
            <h1>Sign Up</h1>
            <p class="subtitle">Register as teacher or student</p>

            <div class="form-group">
                <label for="role">Select Role</label>
                <select id="role">
                    <option value="teacher">Teacher</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div class="form-group">
                <label for="newUser">Username</label>
                <input type="text" id="newUser" placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="newPass">Password</label>
                <input type="password" id="newPass" placeholder="Enter password">
            </div>

            <label class="show-pass modern-check">
                <input type="checkbox" onclick="togglePassword('newPass')">
                <span>Show Password</span>
            </label>

            <div class="button-group">
                <button class="primary-btn" onclick="signup()">Register</button>
                <button class="secondary-btn" onclick="goToLogin()">Back to Login</button>
            </div>

            <p id="msg" class="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
